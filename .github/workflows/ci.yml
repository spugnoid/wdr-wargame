name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test calculation engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r counters/requirements.txt
      - run: python3 -m pytest counters/ -v

  docs:
    name: Build docs (warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r docs/requirements.txt
      - run: python3 -m sphinx -b html docs/source /tmp/build -W
